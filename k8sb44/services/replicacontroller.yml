apiversion: v1
kind: replicationcontroller

metadata:
name: webappreplicacontroller
labels:
app: webappreplicacontroller

spec:
replicas: 3
selector: 
app: nginxpodrc
template: 

metadata:  #tags , assigning metadata to pod
     
    labels:
    app: nginxpodrc   
spec:  #pod specifications.
  spec:
  containers:
    - name: nginxpodrs
      image: nginx:latest
      ports:
        - containerPort: 80

