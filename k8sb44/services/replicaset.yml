apiversion: apps/v1
kind: replicaset

metadata:
name: webapprs
labels:
app: webapprs

spec:
replicas: 3
selector: 
matchLabels: 
app: nginxpodrs
template: 

metadata:  #tags , assigning metadata 
labels: 
app: nginxpodrs
spec:  #pod specifications.
  spec:
  containers:
    - name: nginxpodrs
      image: nginx:latest
      ports:
        - containerPort: 80
        

