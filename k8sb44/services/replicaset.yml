apiversion: apps/v1
kind: replicaset

metadata:
name: webapprs
labels:
app: webapprs

spec:
replicas: 3
selector: 
matchlabels: 
app: nginxpodrs
template: 

metadata:  #tags , assigning metadata 
labels: 
app: nginxpodrs
spec:  #pod specifications.
   containers:
   - name: nginxpodrs
    image: nginx:latest
    port:
- containerPort: 80
        

