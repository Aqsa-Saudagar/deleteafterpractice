apiVersion:  networking.k8s.io/v1
kind: Ingress
metadata:
       name: ingress
       annotations: 
           nginx.ingress.kubernetes.io/rewrite-target: / 
spec:   
   ingressClassName: nginx 
   rules: 
     - host: a23beec44ec374102a795d31994257a3-137776640.ap-south-1.elb.amazonaws.com   #lbendpoint 
       http:
          paths:
            - path:  /    #if only lb traffic will redirect to nginx microservice  
              pathType: Prefix 
              backend:
                 service:
                    name: npci
                    port:
                       number: 80 
            - path:  /tomcat    #if only lb traffic will redirect to nginx microservice  
              pathType: Prefix 
              backend:
                 service:
                    name: tcci
                    port:
                       number: 8080           
                  