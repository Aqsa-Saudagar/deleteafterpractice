apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ssdb2
spec:
  serviceName: ssdb2
  replicas: 3
  selector:
    matchLabels:
      app: ssdb2
  template:
    metadata:
      labels:
        app: ssdb2
    spec:
      containers:
      - name: ssdb2
        image: mysql:latest
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom: 
              secretKeyRef:
                   name: ssdb-secret
                   key: root_pw
